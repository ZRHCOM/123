<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWICEZ Zenith</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
}
.page { display: none; }
.page.active { display: block; }

/* 登录注册页 */
.auth-page {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.auth-box {
  background: white;
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.logo {
  text-align: center;
  margin-bottom: 30px;
}
.logo h1 {
  font-size: 32px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 5px;
}
.logo p {
  color: #999;
  font-size: 14px;
}
.tab-bar {
  display: flex;
  margin-bottom: 30px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid #667eea;
}
.tab-bar button {
  flex: 1;
  padding: 12px;
  border: none;
  background: white;
  color: #667eea;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
}
.tab-bar button.active {
  background: #667eea;
  color: white;
}
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border: 2px solid #eee;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
}
input:focus { border-color: #667eea; }
.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
}
.btn:active { opacity: 0.8; }
.msg {
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  display: none;
  font-size: 14px;
}
.msg.ok { display: block; background: #d4edda; color: #155724; }
.msg.err { display: block; background: #f8d7da; color: #721c24; }

/* 主页面 */
.main-page {
  padding: 20px;
  max-width: 500px;
  margin: 0 auto;
}
.header {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.header h2 {
  font-size: 24px;
  margin-bottom: 10px;
  color: #333;
}
.user-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}
.balance-card {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-radius: 15px;
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}
.balance-card .label {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 5px;
}
.balance-card .amount {
  font-size: 42px;
  font-weight: bold;
}
.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 20px;
}
.menu-item {
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}
.menu-item:active { transform: scale(0.95); }
.menu-item .icon {
  font-size: 32px;
  margin-bottom: 8px;
}
.menu-item .title {
  font-size: 16px;
  color: #333;
  font-weight: bold;
}

/* 充值页 */
.recharge-page {
  padding: 20px;
  max-width: 500px;
  margin: 0 auto;
}
.back-btn {
  background: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  cursor: pointer;
  font-size: 16px;
}
.amount-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.amount-btn {
  background: white;
  border: 2px solid #667eea;
  color: #667eea;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}
.amount-btn.selected {
  background: #667eea;
  color: white;
}
.card-input {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- 登录注册页 -->
<div id="authPage" class="page active auth-page">
  <div class="auth-box">
    <div class="logo">
      <h1>🏮 TWICEZ</h1>
      <p>zenith zealots · v7.0</p>
    </div>
    <div class="tab-bar">
      <button class="active" onclick="switchTab('login')">登录</button>
      <button onclick="switchTab('register')">注册</button>
    </div>
    <div id="authMsg" class="msg"></div>
    
    <div id="loginForm">
      <input type="text" id="loginUser" placeholder="👤 用户名">
      <input type="password" id="loginPass" placeholder="🔒 密码">
      <button class="btn" onclick="doLogin()">立即进入</button>
    </div>
    
    <div id="registerForm" style="display:none">
      <input type="text" id="regUser" placeholder="👤 设置用户名">
      <input type="password" id="regPass" placeholder="🔒 设置密码">
      <input type="password" id="regPass2" placeholder="🔒 确认密码">
      <button class="btn" onclick="doRegister()">确认注册</button>
    </div>
  </div>
</div>

<!-- 主页 -->
<div id="mainPage" class="page main-page">
  <div class="header">
    <h2>👑 TWICEZ 会员</h2>
    <div class="user-info">
      <span>欢迎，<strong id="showUser"></strong></span>
    </div>
  </div>
  
  <div class="balance-card">
    <div class="label">当前余额</div>
    <div class="amount">¥<span id="showBalance">0.00</span></div>
  </div>
  
  <div class="menu-grid">
    <div class="menu-item" onclick="showRecharge()">
      <div class="icon">💰</div>
      <div class="title">充值中心</div>
    </div>
    <div class="menu-item">
      <div class="icon">👥</div>
      <div class="title">团队信息</div>
    </div>
    <div class="menu-item">
      <div class="icon">📦</div>
      <div class="title">我的订单</div>
    </div>
    <div class="menu-item">
      <div class="icon">🎁</div>
      <div class="title">邀请好友</div>
    </div>
  </div>
  
  <button class="btn" style="background: #dc3545; margin-top: 20px;" onclick="doLogout()">🚪 退出登录</button>
</div>

<!-- 充值页 -->
<div id="rechargePage" class="page recharge-page">
  <button class="back-btn" onclick="backToMain()">‹ 返回</button>
  
  <div class="balance-card">
    <div class="label">当前余额</div>
    <div class="amount">¥<span id="rechargeBalance">0.00</span></div>
  </div>
  
  <div id="rechargeMsg" class="msg"></div>
  
  <div style="background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px;">
    <h3 style="margin-bottom: 15px; color: #333;">选择面额</h3>
    <div class="amount-grid">
      <button class="amount-btn" onclick="pickAmount(30, this)">¥30</button>
      <button class="amount-btn" onclick="pickAmount(68, this)">¥68</button>
      <button class="amount-btn" onclick="pickAmount(128, this)">¥128</button>
      <button class="amount-btn" onclick="pickAmount(198, this)">¥198</button>
      <button class="amount-btn" onclick="pickAmount(328, this)">¥328</button>
      <button class="amount-btn" onclick="pickAmount(648, this)">¥648</button>
    </div>
    <input type="number" id="customAmount" placeholder="或输入自定义金额" style="margin-top: 10px;">
  </div>
  
  <div class="card-input">
    <h3 style="margin-bottom: 15px; color: #333;">支付信息</h3>
    <input type="text" id="creditCard" placeholder="银行卡号 / 支付宝 / 微信">
  </div>
  
  <button class="btn" onclick="doRecharge()">确认充值</button>
  <p style="text-align: center; color: white; margin-top: 15px; font-size: 14px;">支持支付宝 · 微信 · 银行卡</p>
</div>

<script>
const API = '/.netlify/functions';
let currentUser = '';
let currentBalance = 0;
let selectedAmount = 0;

function switchTab(tab) {
  const btns = document.querySelectorAll('.tab-bar button');
  btns.forEach(b => b.classList.remove('active'));
  if (tab === 'login') {
    btns[0].classList.add('active');
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
  } else {
    btns[1].classList.add('active');
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
  }
  hideMsg('authMsg');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

function hideMsg(id) {
  document.getElementById(id).className = 'msg';
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function showRecharge() {
  document.getElementById('rechargeBalance').textContent = currentBalance.toFixed(2);
  showPage('rechargePage');
}

function backToMain() {
  showPage('mainPage');
  hideMsg('rechargeMsg');
}

function pickAmount(val, btn) {
  selectedAmount = val;
  document.getElementById('customAmount').value = '';
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  if (!username || !password) {
    showMsg('authMsg', '请输入用户名和密码', 'err');
    return;
  }
  try {
    showMsg('authMsg', '登录中...', 'ok');
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      currentUser = data.username;
      currentBalance = Number(data.balance);
      document.getElementById('showUser').textContent = currentUser;
      document.getElementById('showBalance').textContent = currentBalance.toFixed(2);
      showPage('mainPage');
    } else {
      showMsg('authMsg', data.error || '登录失败', 'err');
    }
  } catch (e) {
    showMsg('authMsg', '网络错误，请重试', 'err');
  }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value.trim();
  const password2 = document.getElementById('regPass2').value.trim();
  if (!username || !password) {
    showMsg('authMsg', '请填写所有字段', 'err');
    return;
  }
  if (password !== password2) {
    showMsg('authMsg', '两次密码不一致', 'err');
    return;
  }
  try {
    showMsg('authMsg', '注册中...', 'ok');
    const res = await fetch(API + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('authMsg', '注册成功！请切换到登录', 'ok');
    } else {
      showMsg('authMsg', data.error || '注册失败', 'err');
    }
  } catch (e) {
    showMsg('authMsg', '网络错误，请重试', 'err');
  }
}

async function doRecharge() {
  const custom = document.getElementById('customAmount').value;
  const amount = custom ? Number(custom) : selectedAmount;
  const creditCard = document.getElementById('creditCard').value.trim();
  if (!amount || amount <= 0) {
    showMsg('rechargeMsg', '请选择或输入充值金额', 'err');
    return;
  }
  if (!creditCard) {
    showMsg('rechargeMsg', '请输入支付信息', 'err');
    return;
  }
  try {
    showMsg('rechargeMsg', '充值处理中...', 'ok');
    const res = await fetch(API + '/recharge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser, amount, creditCard })
    });
    const data = await res.json();
    if (res.ok) {
      currentBalance = Number(data.balance);
      document.getElementById('showBalance').textContent = currentBalance.toFixed(2);
      document.getElementById('rechargeBalance').textContent = currentBalance.toFixed(2);
      showMsg('rechargeMsg', '充值成功！订单号：' + data.orderId, 'ok');
      document.getElementById('customAmount').value = '';
      document.getElementById('creditCard').value = '';
      selectedAmount = 0;
      document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    } else {
      showMsg('rechargeMsg', data.error || '充值失败', 'err');
    }
  } catch (e) {
    showMsg('rechargeMsg', '网络错误，请重试', 'err');
  }
}

function doLogout() {
  currentUser = '';
  currentBalance = 0;
  showPage('authPage');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  hideMsg('authMsg');
}
</script>
</body>
</html>
